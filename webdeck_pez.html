ut{background:var(--navy);color:#fff}.bigIcon{font-size:4rem;display:block;margin-bottom:16px}.timeline{display:grid;gap:16px}.timeline b,.stats b,.factGrid b{font-size:clamp(1.8rem,4vw,3.4rem);font-family:Fraunces,Georgia,serif;color:var(--navy);display:block}.timeline span,.stats span,.factGrid span{display:block;color:#516072;font-size:clamp(.95rem,1.3vw,1.12rem);line-height:1.35}.factGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:34px}.factGrid>div{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:24px;color:#fff}.factGrid b{color:var(--gold)}.factGrid span{color:#eaf2ff}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;background:#fff}.stats div{padding:18px;border-radius:20px;background:#f0f5ff}.heroImage,.imageStage{height:100%;width:100%;display:grid;place-items:center;background:#071f4a}.heroImage img,.imageStage img{width:100%;height:100%;object-fit:contain}.overlayTitle{position:absolute;left:clamp(22px,6vw,90px);bottom:clamp(116px,12vw,168px);max-width:720px;background:rgba(7,31,74,.78);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(12px);border-radius:30px;padding:clamp(22px,4vw,42px);box-shadow:0 24px 70px rgba(0,0,0,.3)}.overlayTitle p:last-child{color:#dbeafe;margin-top:14px}.captionCard{position:absolute;left:clamp(22px,6vw,90px);bottom:116px;max-width:520px;background:rgba(255,255,255,.9);color:var(--ink);backdrop-filter:blur(10px)}.captionCard h2{font-size:clamp(2rem,4vw,3.5rem);margin-bottom:10px}.browser{border-radius:24px;overflow:hidden;box-shadow:var(--shadow);border:1px solid rgba(10,52,118,.18);background:#fff}.browser img{width:100%;display:block}.resource,.links a{display:inline-block;margin-top:22px;text-decoration:none;background:var(--gold);color:#071f4a;font-weight:800;border-radius:999px;padding:14px 20px}.promptSlide{grid-template-columns:.7fr 1.3fr}pre{white-space:pre-wrap;margin:0;background:#071f4a;color:#eaf2ff;border-radius:2 us:28px;padding:28px;box-shadow:0 30px 90px rgba(0,0,0,.35);z-index:50;transition:transform .25s ease;pointer-events:none}.notesPanel.open,.help.open{transform:translateX(-50%) translateY(0);pointer-events:auto}.notesPanel h3,.help h3{font-family:Fraunces,Georgia,serif;font-size:2rem;margin:0 0 10px}.helpGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.helpGrid div{background:#f0f5ff;border-radius:14px;padding:12px}.presenter{display:none;position:fixed;inset:0;background:#071f4a;color:white;z-index:80;padding:28px;grid-template-columns:1fr 1fr;gap:24px}.presenter.on{display:grid}.mini{background:white;border-radius:18px;overflow:hidden;min-height:40vh;color:#071f4a;padding:22px}.presentNotes,.nextCue{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:22px}.timer{position:absolute;right:28px;top:18px;color:var(--gold);font-weight:800}.cursorLeft{cursor:w-resize}.cursorRight{cursor:e-resize}@media (max-width:1024px){.twoCol,.split,.statLayout,.promptSlide,.imageLeft{grid-template-columns:1fr}.factGrid,.cards.four{grid-template-columns:repeat(2,1fr)}.flow{grid-template-columns:repeat(3,1fr)}.slide.active{place-items:start center}.slide{padding-top:56px}}@media (max-width:640px){.deckTitle{display:none}.bar{gap:7px;padding:8px}.ctrl{min-width:34px;height:34px;padding:0 9px}.dot{width:9px;height:9px}.dot.active{width:23px}.factGrid,.cards.four,.flow,.stats{grid-template-columns:1fr}.slide{padding:34px 18px 112px}.overlayTitle,.captionCard{left:14px;right:14px;bottom:98px}.counter{display:none}.helpGrid{grid-template-columns:1fr}pre{font-size:.78rem;padding:18px}}@media (max-height:520px) and (orientation:landscape){.slide{padding-top:24px}.bar{bottom:8px}.overlayTitle,.captionCard{bottom:80px}}@media (hover:none){.ctrl{min-width:44px;height:44px}.dot{height:14px;width:14px}}@media (prefers-reduced-motion:reduce){*,*:before,*:after{transition:none!important;animation:none!important}}

om angle</h3><p>Prompt, generate, evaluate, revise, and share. That is a usable creative cycle in one small package.</p></div></div>", "notes": "This slide gives the why behind the activity. The appeal is not just that the images are funny. The appeal is that the task is small enough for people to finish. A clear prompt leads to a visible result, and the result gives you something concrete to discuss. Students can compare the generated image to the prompt, identify what the model followed, and decide what needs revision. That is a useful Gen AI routine without making the task feel like a formal lesson."}, {"bg": "light", "title": "A Little PEZ History", "html": "<div class=\"split\"><div class=\"historyCard\"><p class=\"eyebrow\">A little history</p><h2>PEZ started as peppermint, not a toy.</h2><p>PEZ candy was invented in 1927 in Vienna by Eduard Haas III. It was first marketed to adults as a peppermint candy and smoking alternative.</p><p>The name comes from the German word for peppermint: <strong>PfeffErminZ</strong>.</p></div><div class=\"timeline\"><div><b>1927</b><span>Invented in Vienna</span></div><div><b>1950s</b><span>Arrives in the United States</span></div><div><b>1957</b><span>Early character heads appear</span></div><div><b>1958</b><span>Popeye becomes the first licensed character</span></div></div></div>", "notes": "This is the short background that keeps the activity from being only a novelty image prompt. PEZ began as peppermint candy, then became the toy-like dispenser people recognize. That gives students a little context for why the dispenser format has stayed around: it is candy, packaging, character design, and pop culture in one object. For a quick lesson, this history is enough. It gives students something real to connect to before they start designing their own version."}, {"bg": "navy", "title": "Fast PEZ Facts", "html": "<h2>Fast PEZ facts</h2><div class=\"factGrid\"><div><b>PEZheads</b><span>Collectors have their own nickname.</span></div><div><b>4,000+</b><span>The Visitor Center includes thousands of unique dispensers.</span></div><div><b>14 feet</b><span>It also houses a giant glowing PEZ dispenser.</span></div><div><b>12 million</b><span>The Orange, Connecticut factory makes about twelve million tablets per day for the United States and Canada.</span></div></div>", "notes": "This slide pulls out the bits that make PEZ feel bigger than a candy dispenser. There is a collector culture, a visitor center, rare vintage items, and a production story. Those facts give teachers several ways to connect the activity to class: math, product design, media literacy, history, or even writing. I would not overbuild it. The facts are here to give the creative task a little substance and to show that small objects can carry a surprising amount of cultural history."}, {"bg": "light", "title": "PEZ by the Numbers", "html": "<div class=\"statLayout\"><div><p class=\"eyebrow\">Math hook</p><h2>There is quick math hiding in the candy.</h2><p class=\"lead\">A standard refill pack usually contains twelve candies, and many dispensers hold about two packs.</p><p>That turns the activity into estimation, measurement, volume, scale, or production-rate thinking without losing the fun.</p></div><div class=\"stats\"><div><b>15 mm</b><span>Candy length</span></div><div><b>8 mm</b><span>Candy width</span></div><div><b>5 mm</b><span>Candy height</span></div><div><b>24</b><span>Approximate candies in a dispenser</span></div></div></div>", "notes": "Here is the practical classroom bridge. The article includes enough numbers to turn a fun image activity into a quick math connection. Students can estimate how many candies fit in a dispenser, compare dimensions, or scale up a design. They could also use the production number from the PEZ factory to explore rates. The key is to keep it light. The math should support the activity, not bury it."}, {"bg": "imgslide", "title": "Guess the Staffers", "html": "<div class=\"imageStage\"><img sr tes": "This slide shows the guessing-game version from the article. It is a good reminder that the activity works better when there is an audience. People look for recognizable features: hair, glasses, smile, clothing, and small details. In a classroom, that same habit can become image critique. What details helped you recognize the person or historical figure? Which details felt invented? What prompt change would make the result more accurate? That is a useful discussion because it ties creativity to evaluation."}, {"bg": "light", "title": "The Prompt", "html": "<div class=\"promptSlide\"><div><p class=\"eyebrow\">Copy-ready prompt</p><h2>Use a clear photo and a specific visual target.</h2><p>Head-and-shoulders photos work best. The prompt asks for a cartoon-like, collectible dispenser while keeping recognizable features from the reference photo.</p></div><pre><code>Create a PEZ-style candy dispenser using the person in the reference photo as inspiration. Make the head cartoon-like, stylized, and collectible-looking, not realistic. Keep recognizable features like hairstyle, glasses, smile, and overall vibe. The dispenser should have an oversized toy-like head attached to a classic PEZ dispenser body. Use bright colors and smooth plastic textures. Show the full dispenser standing upright on a clean background.</code></pre></div>", "notes": "This is the working prompt from the activity, tightened into a slide-friendly form. Notice the useful parts. It names the output, names the style, names what to preserve from the photo, and names what the final image should include. It also says what not to do: do not make it realistic. For students, that is an important prompt-writing lesson. Good image prompts are not just descriptions. They include boundaries, priorities, and details the model can follow."}, {"bg": "light", "title": "Share on PEZ Central", "html": "<div class=\"twoCol imageLeft\"><div class=\"browser\"><img src=\"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQAB ticle points readers to a StickyBoard space where they can share PEZ creations and the prompts they used.</p><p>That sharing step matters. It turns the activity from a one-off image into a small gallery of prompt choices, revisions, and creative decisions.</p><a class=\"resource\" href=\"https://mglearn.github.io/tcea/stickyboard/pezcentral/\" target=\"_blank\" rel=\"noopener\">Open PEZ Central</a></div></div>", "notes": "This slide shows the collaborative board connected to the activity. The share space is useful because the prompt becomes visible alongside the image. That lets people compare process and result. A teacher could use the same idea for a class gallery: one note for the image, one note for the prompt, and one short reflection on what changed between the first and final version. The tool is not the main point. The main point is making the creative process visible."}, {"bg": "light", "title": "Historical Possibilities", "html": "<p class=\"eyebrow\">Classroom extension</p><h2>Turn the trend into a historical design challenge.</h2><div class=\"cards four\"><div><span>\ud83d\udc51</span><h3>Pharaoh</h3><p>Use symbols, clothing, and artifacts from ancient Egypt.</p></div><div><span>\ud83d\udee1\ufe0f</span><h3>Roman centurion</h3><p>Focus on armor, rank, tools, and empire context.</p></div><div><span>\u26f5</span><h3>Viking explorer</h3><p>Connect the design to travel, trade, and navigation.</p></div><div><span>\ud83d\ude80</span><h3>Space Race astronaut</h3><p>Show gear, mission details, and era-specific clues.</p></div></div>", "notes": "This is where the activity becomes more than a personal avatar. Students can apply the same format to historical figures or roles. The important part is not making a cute dispenser. The important part is deciding what details belong in the design and why. A student who makes a pharaoh version should be able to explain the symbols they chose. A student who makes an astronaut version should connect the design to the Space Race. That explanation is where the learning lives."}, {"bg": "navy", "title": "A Simple Lesson Flow", "html": "<h2>A simple lesson flow</h2><div class=\"flow\"><div><b>1</b><span>Choose a person, figure, or role</span></div><div><b>2</b><span>List three must-keep visual details</span></div><div><b>3</b><span>Write the image prompt</span></div><div><b>4</b><span>Generate and revise</span></div><div><b>5</b><span>Share the image and prompt</span></div></div><p class=\"noteLine\">Keep the reflection short: \u201cWhat detail made this accurate?\u201d and \u201cWhat would I revise next?\u201d</p>", "notes": "This is the version I would actually use if I were turning the blog post into a classroom activity. Five steps are enough. Students choose the subject, identify the visual details that matter, write the prompt, revise the image, and share both the final result and the prompt. The reflection should be short so the activity keeps its momentum. Ask what made the result accurate and what they would revise next. Those two questions pull students toward evidence and improvement without turning the whole thing into a worksheet."}, {"bg": "dark", "title": "Closing", "html": "<div class=\"closing\"><p class=\"eyebrow\">Summer Gen AI idea</p><h2>Small candy, big prompt practice.</h2><p>Use the PEZ trend as a quick way to practice visual description, prompt revision, image critique, and creative sharing.</p><div class=\"links\"><a href=\"https://blog.tcea.org/turn-yourself-into-a-pez-dispenser-with-ai-this-summer/\" target=\"_blank\" rel=\"noopener\">Read the original TCEA post</a><a href=\"https://mglearn.github.io/tcea/stickyboard/pezcentral/\" target=\"_blank\" rel=\"noopener\">Visit PEZ Central</a></div></div>", "notes": "I would close by bringing it back to the simplest practical use. This is a small summer activity, but it gives people a safe way to practice with Gen AI image tools. The task asks for a clear prompt, a visible result, and a revision decision. That is a good pattern to practice before trying more serious classroom uses. The original post has the full prompt, the PEZ facts, and the PEZ Central link, so that is the best place for people to start."}];
let idx=0, notesOpen=false, helpOpen=false, presenter=false, audienceWin=null, start=Date.now();
const el={slides:document.getElementById('slides'),dots:document.getElementById('dots'),counter:document.getElementById('counter'),progress:document.getElementById('progress'),notes:document.getElementById('notesPanel'),notesTitle:document.getElementById('notesTitle'),notesText:document.getElementById('notesText'),help:document.getElementById('help'),presenter:document.getElementById('presenter'),mini:document.getElementById('mini'),presentNotes:document.getElementById('presentNotes'),nextCue:document.getElementById('nextCue'),timer:document.getElementById('timer')};
const bc = ('BroadcastChannel' in window)?new BroadcastChannel('pez-webdeck-sync'):null;
function build(){el.slides.innerHTML=SLIDES.map((s,i)=>`<section class="slide ${s.bg||'light'}" data-i="${i}"><div class="slideContent">${s.html}</div></section>`).join('');el.dots.innerHTML=SLIDES.map((_,i)=>`<button class="dot" aria-label="Go to slide ${i+1}" data-i="${i}"></button>`).join('');el.dots.querySelectorAll('.dot').forEach(d=>d.onclick=e=>go(+e.currentTarget.dataset.i));let h=parseInt(location.hash.replace('#',''),10); if(h>=1&&h<=SLIDES.length) idx=h-1; render(false)}
function render(push=true){document.querySelectorAll('.slide').forEach((s,i)=>s.classList.toggle('active',i===idx));el.dots.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));el.counter.textContent=`${idx+1} / ${SLIDES.length}`;el.progress.style.width=((idx+1)/SLIDES.length*100)+'%';el.notesTitle.textContent=SLIDES[idx].title;el.notesText.textContent=SLIDES[idx].notes;document.title=SLIDES[idx].title+' · WebDeck';if(push) history.replaceState(null,'','#'+(idx+1));updatePresenter(); if(bc) bc.postMessage({idx});}
function go(n){idx=Math.max(0,Math.min(SLIDES.length-1,n));render()}function next(){go(idx+1)}function prev(){go(idx-1)}
function toggleNotes(){notesOpen=!notesOpen;el.notes.classList.toggle('open',notesOpen)}function toggleHelp(){helpOpen=!helpOpen;el.help.classList.toggle('open',helpOpen)}
function fullscreen(){if(!document.fullscreenElement) document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.()}
function updatePresenter(){if(!presenter)return;el.mini.innerHTML=SLIDES[idx].html;el.presentNotes.textContent=SLIDES[idx].notes;el.nextCue.textContent=SLIDES[idx+1]?SLIDES[idx+1].title:'End of deck'}
function openPresenter(){presenter=true;el.presenter.classList.add('on');updatePresenter(); audienceWin=window.open(location.href,'pezAudience','popup=yes,width=1200,height=800');}
function tick(){let s=Math.floor((Date.now()-start)/1000),m=Math.floor(s/60);el.timer.textContent=String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}setInterval(tick,1000);
document.getElementById('prev').onclick=prev;document.getElementById('next').onclick=next;document.getElementById('notesBtn').onclick=toggleNotes;document.getElementById('fsBtn').onclick=fullscreen;document.getElementById('helpBtn').onclick=toggleHelp;
document.addEventListener('keydown',e=>{if(e.target.closest('input,textarea'))return; if(['ArrowRight','ArrowDown',' '].includes(e.key)){e.preventDefault();next()}else if(['ArrowLeft','ArrowUp'].includes(e.key)){e.preventDefault();prev()}else if(e.key==='Home')go(0);else if(e.key==='End')go(SLIDES.length-1);else if(e.key.toLowerCase()==='n')toggleNotes();else if(e.key.toLowerCase()==='h'||e.key==='?')toggleHelp();else if(e.key.toLowerCase()==='f')fullscreen();else if(e.key.toLowerCase()==='p')openPresenter();});
window.addEventListener('hashchange',()=>{let h=parseInt(location.hash.replace('#',''),10);if(h>=1&&h<=SLIDES.length)go(h-1)}); if(bc) bc.onmessage=e=>{if(e.data&&Number.isInteger(e.data.idx)&&e.data.idx!==idx){idx=e.data.idx;render(false)}};
let sx=0,sy=0;document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});document.addEventListener('touchend',e=>{let dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)){dx<0?next():prev()}},{passive:true});
document.addEventListener('click',e=>{if(presenter||notesOpen||helpOpen)return;if(e.target.closest('a,button,.bar,.notesPanel,.help,.presenter'))return;if(String(window.getSelection()))return;let x=e.clientX,w=innerWidth;if(x<w/3)prev();else if(x>w*2/3)next();});
document.addEventListener('mousemove',e=>{document.body.classList.toggle('cursorLeft',e.clientX<innerWidth/6);document.body.classList.toggle('cursorRight',e.clientX>innerWidth*5/6)});
build();
</script></body></html>
